<!DOCTYPE html>
<html>
<head>
    <title>Assignments</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
    <h1>Learn Academy</h1>
</header>

<div class="page-content">
<div class="container">

    <h2>Assignments</h2>

    <pre id="assignments"></pre>

    <input type="number"
        id="assignment_id"
        placeholder="Assignment ID">

    <input type="number"
        id="marks"
        placeholder="Marks">

    <input type="text"
        id="feedback"
        placeholder="Feedback">

    <button onclick="gradeAssignment()">
        Grade Assignment
    </button>

    <button onclick="goBack()" 
style="margin-top:20px;background:#333;">
    ← Back to Dashboard
</button>


</div>
</div>

<script src="js/instructor.js"></script>

</body>
</html>
